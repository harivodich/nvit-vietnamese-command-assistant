name: Kiểm tra chất lượng

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Lấy source
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cài project và công cụ kiểm tra
        run: |
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Kiểm tra dataset và leakage
        run: |
          python scripts/validate_data.py --data-dir data/samples
          python scripts/audit_normalization.py --data-dir data/samples

      - name: Kiểm tra style và kiểu dữ liệu
        run: |
          ruff check .
          mypy src

      - name: Chạy toàn bộ test
        run: |
          pytest -q
          nvit-assistant --json "gọi cho mẹ"
